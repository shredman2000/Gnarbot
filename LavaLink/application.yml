server:
  port: 2333

logging:
  level:
    root: INFO
    lavalink: DEBUG

lavalink:
  server:
    password: "youshallnotpass"
    sources:
      youtube: false
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
    bufferDurationMs: 400

  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.0"
      repository: "https://maven.lavalink.dev/releases"

plugins:
  youtube:
      enabled: true
      allowSearch: true
      allowDirectVideoIds: true
      allowDirectPlaylistIds: true
      clients:
        - TV
        - WEB
        - ANDROID_VR
        - WEBEMBEDDED

metrics:
  prometheus:
    enabled: false